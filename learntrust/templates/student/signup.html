{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LearnTrust | Sign Up</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .box {
            width: 700px;
            height: 380px;
            display: flex;
            background: #fff;
        }

        .left {
            width: 50%;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .right {
            width: 50%;
            padding: 40px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #eee;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            font-weight: bold;
            color: #000;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="left">LEARNTRUST</div>

    <div class="right">
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <div class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </div>
    </div>

</div>

</body>
</html>
