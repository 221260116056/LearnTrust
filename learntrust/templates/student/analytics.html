{% extends 'base.html' %}

{% block content %}

<h1>Analytics</h1>
<p class="subtext">Your learning performance overview</p>

<div class="stats-grid">
    <div class="stat-card">
        <h4>Total Hours Spent</h4>
        <p>{{ hours_spent }}</p>
    </div>

    <div class="stat-card">
        <h4>Courses Completed</h4>
        <p>{{ completed_courses }}</p>
    </div>

    <div class="stat-card">
        <h4>Average Score</h4>
        <p>{{ average_score }}%</p>
    </div>
</div>

<div class="chart-section">
    <h3>Weekly Study Activity</h3>
    <canvas id="weeklyChart" height="120"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('weeklyChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
            label: 'Hours',
            data: [2, 3, 8, 4, 5, 6, 2],
        }]
    },
});
</script>

{% endblock %}
